<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Recipients — Vendor & Contract Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="page-title-row">
    <div>
      <div class="page-title">Email Recipients</div>
      <div class="page-sub">Manage who receives the daily contract renewal digest email.</div>
    </div>
    <a href="index.html" class="btn">&larr; Back to dashboard</a>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Recipients</h2>
    </div>

    <div class="add-recipient-row">
      <input type="email" id="recipientEmail" placeholder="name@company.com">
      <button class="btn primary" id="addRecipientBtn">+ Add recipient</button>
    </div>

    <p id="recipientFormMessage" class="form-message"></p>

    <div id="recipientsList" class="recipients-list">
      <p style="font-size:13px; color:#6b7684;">Loading recipients...</p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Test the digest email</h2>
    </div>
    <p style="font-size:13px; color:#6b7684; margin-top:0;">
      Sends today's digest immediately to all recipients above — useful for demos, without waiting for the daily schedule.
    </p>
    <button class="btn primary" id="sendTestEmailBtn">Send test email now</button>
    <p id="testEmailMessage" class="form-message"></p>
  </div>
</div>

<script src="recipients.js"></script>
</body>
</html>
