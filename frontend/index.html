<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 2 — Vendor & Contract Dashboard (Static Shell)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <div class="card">
    <div class="card-header">
      <h2>Contracts</h2>
      <button class="btn primary" id="openFormBtn">+ Add vendor</button>
    </div>

    <div class="legend">
      <span><span class="dot red"></span> Red — 10 days or fewer left</span>
      <span><span class="dot yellow"></span> Yellow — 11-20 days left</span>
      <span><span class="dot green"></span> Green — 21-30 days left</span>
    </div>

    <div class="contract-row">
      <div class="row-left">
        <span class="dot red"></span>
        <div>
          <div class="vendor-name">Kyndryl Solutions</div>
          <div class="contract-meta">Cloud Hosting &middot; Due 30 Sep 2025</div>
        </div>
      </div>
      <div class="row-actions">
        <button class="btn">View</button>
        <button class="btn danger">Discontinue</button>
      </div>
    </div>

    <div class="contract-row">
      <div class="row-left">
        <span class="dot yellow"></span>
        <div>
          <div class="vendor-name">Bharti Airtel Limited</div>
          <div class="contract-meta">Hardware AMC/Infra Support &middot; Due 31 May 2027</div>
        </div>
      </div>
      <div class="row-actions">
        <button class="btn">View</button>
        <button class="btn danger">Discontinue</button>
      </div>
    </div>

    <div class="contract-row">
      <div class="row-left">
        <span class="dot green"></span>
        <div>
          <div class="vendor-name">Diamond Infotech Pvt. Ltd.</div>
          <div class="contract-meta">Security &middot; Due 8 Jul 2026</div>
        </div>
      </div>
      <div class="row-actions">
        <button class="btn">View</button>
        <button class="btn danger">Discontinue</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addVendorModal">
  <div class="modal-box">
    <h3>Add vendor</h3>

    <div class="field-group">
      <label for="vendorName">Vendor name</label>
      <input type="text" id="vendorName" placeholder="e.g. Kyndryl Solutions">
    </div>

    <div class="field-group">
      <label for="vendorType">Type</label>
      <select id="vendorType">
        <option>Cloud Hosting</option>
        <option>Application Support</option>
        <option>Hardware AMC/Infra Support</option>
        <option>Security</option>
        <option>License</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn" id="cancelFormBtn">Cancel</button>
      <button class="btn primary">Save</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
